<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JYSK AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F7F5;--surface:#FFF;--surface-hover:#F0EFED;--text:#1A1A1A;--text-s:#6B6B6B;--text-t:#9B9B9B;--accent:#2563EB;--accent-l:#EFF6FF;--accent-t:#1E40AF;--border:#E5E5E3;--border-l:#F0EFED;--success:#059669;--success-bg:#ECFDF5;--r:12px;--rs:8px}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.s-header{padding:16px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:var(--rs);display:flex;align-items:center;justify-content:center}
.logo svg{width:18px;height:18px}
.s-header h1{font-size:15px;font-weight:600}
.new-btn{margin:12px 12px 6px;padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.new-btn:hover{opacity:.9}
.c-list{flex:1;overflow-y:auto;padding:6px}
.c-item{padding:9px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--text-s);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.c-item:hover{background:var(--surface-hover)}
.c-item.active{background:var(--accent-l);color:var(--accent-t);font-weight:500}
.c-item svg{width:14px;height:14px;flex-shrink:0;opacity:.5}
.s-section{border-top:1px solid var(--border-l);padding:10px 14px}
.s-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-t);margin-bottom:6px}
.doc-i{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:var(--text-s)}
.d-icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.d-icon.pptx{background:#FEE2E2;color:#DC2626}
.d-icon.xlsx{background:#DCFCE7;color:#16A34A}
.d-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-badge{font-size:9px;padding:2px 5px;border-radius:4px;background:var(--success-bg);color:var(--success)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.m-header{padding:14px 20px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.m-title{font-size:13px;font-weight:500}
.m-badge{font-size:10px;padding:3px 8px;background:var(--surface-hover);border-radius:20px;color:var(--text-s)}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.msg{display:flex;gap:10px;max-width:720px;width:100%;margin:0 auto;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.av.ai{background:var(--accent)}
.av.ai svg{width:16px;height:16px}
.av.u{background:#8B5CF6;color:#fff;font-weight:600}
.bbl{padding:10px 14px;border-radius:var(--r);font-size:13px;line-height:1.65;max-width:85%}
.msg.user .bbl{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bbl{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.bbl p{margin-bottom:6px}.bbl p:last-child{margin-bottom:0}
.bbl strong{font-weight:600}
.bbl table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.bbl th,.bbl td{padding:5px 8px;border:1px solid var(--border);text-align:left}
.bbl th{background:var(--surface-hover);font-weight:600}
.bbl ul,.bbl ol{margin:6px 0;padding-left:18px}.bbl li{margin-bottom:3px}
.bbl code{background:var(--surface-hover);padding:1px 4px;border-radius:3px;font-size:12px}
.srcs{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.src{font-size:10px;padding:3px 8px;background:var(--accent-l);color:var(--accent-t);border-radius:5px}
.think{display:flex;gap:4px;padding:6px 0}
.think span{width:5px;height:5px;background:var(--text-t);border-radius:50%;animation:p 1.4s ease-in-out infinite}
.think span:nth-child(2){animation-delay:.2s}.think span:nth-child(3){animation-delay:.4s}
@keyframes p{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:12px}
.w-icon{width:56px;height:56px;background:var(--accent-l);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.w-icon svg{width:28px;height:28px;color:var(--accent)}
.welcome h2{font-size:20px;font-weight:600}
.welcome p{color:var(--text-s);font-size:13px;max-width:380px;line-height:1.6}
.sugg{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.sugg-btn{padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:12px;color:var(--text-s);cursor:pointer}
.sugg-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.in-area{padding:14px 20px 16px;background:var(--surface);border-top:1px solid var(--border-l)}
.in-wrap{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px}
.in-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
#mi{flex:1;border:none;outline:none;font-family:inherit;font-size:13px;background:transparent;resize:none;min-height:32px;max-height:100px;line-height:1.5;padding:4px 0;color:var(--text)}
#mi::placeholder{color:var(--text-t)}
.s-btn{width:32px;height:32px;border:none;background:var(--accent);color:#fff;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-btn:hover{opacity:.9}.s-btn:disabled{opacity:.4;cursor:default}
.s-btn svg{width:16px;height:16px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:var(--surface);padding:28px;border-radius:16px;max-width:400px;width:90%}
.modal-box h2{font-size:16px;margin-bottom:6px}
.modal-box p{font-size:12px;color:var(--text-s);margin-bottom:14px;line-height:1.6}
.modal-box input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;margin-bottom:10px}
.modal-box button{width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
@media(max-width:768px){.sidebar{display:none}.msgs{padding:14px}}
</style>
</head>
<body>
<div class="modal" id="apm" style="display:none"><div class="modal-box"><h2>OpenAI API ključ</h2><p>Ključ se sprema samo lokalno u tvom browseru.</p><input type="password" id="aki" placeholder="sk-proj-..." autocomplete="off"><button onclick="saveKey()">Spremi</button></div></div>
<aside class="sidebar">
<div class="s-header"><div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><h1>JYSK Assistant</h1></div>
<button class="new-btn" onclick="newChat()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novi razgovor</button>
<div class="c-list" id="cl"></div>

</aside>
<main class="main">
